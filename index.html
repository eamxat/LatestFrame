<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Latest Power Frame By: EAM96</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse-slow {
      0%, 100% { opacity: 1; }
      50% { opacity: .5; }
    }
    .animate-pulse-slow {
      animation: pulse-slow 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    /* Contenedor estricto para el sprite */
    .sprite-container {
        width: 80px;
        height: 80px;
        overflow: hidden;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Imagen (sin animación para evitar parpadeo) */
    .sprite-image {
        height: 100%;
        width: auto;
        position: absolute;
        left: 0;
        top: 0;
        object-fit: contain;
    }

    /* --- AJUSTES VISUALES EXCLUSIVOS PARA PAWNS (Galería libre) --- */
    #pawns-grid > div {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        padding: 0 !important;
    }
    
    #pawns-grid > div:hover {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
    }

    #pawns-grid > div > span:first-of-type {
        display: none !important;
    }

    #pawns-grid .sprite-container {
        background: transparent !important;
        box-shadow: none !important;
        width: auto !important;
        height: auto !important;
        overflow: visible !important;
    }

    #pawns-grid .sprite-image {
        position: static !important;
        width: auto !important;
        height: auto !important;
        max-width: none !important;
        object-fit: none !important;
        image-rendering: auto; 
    }

    /* Ocultar barra de desplazamiento para dropdown de búsqueda superior */
    .search-scroll::-webkit-scrollbar {
        width: 4px;
    }
    .search-scroll::-webkit-scrollbar-track {
        background: transparent; 
    }
    .search-scroll::-webkit-scrollbar-thumb {
        background: rgba(59, 130, 246, 0.5); 
        border-radius: 10px;
    }
  </style>
</head>
<body class="bg-transparent text-slate-200 h-screen w-screen overflow-hidden font-sans antialiased selection:bg-blue-500/30 select-none flex justify-center m-0 p-0">

  <!-- CONTENEDOR MAESTRO ABSOLUTO PIXEL-PERFECT -->

                <button onclick="window.prevPage()" class="text-slate-400 hover:text-white transition-colors">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" /></svg>

    <!-- ÁREA PRINCIPAL XATFRAME (Bloqueada para clics) -->
    <main class="absolute top-[91px] left-1/2 -translate-x-1/2 w-[1227px] h-[487px] flex justify-between pointer-events-none">

                                    <td class="py-4 px-6">
                                        <div class="flex items-center gap-4">
                                            <div class="inline-block p-1 bg-slate-800 rounded-xl border border-slate-700 shadow-inner">
                                                <div class="sprite-container mx-auto bg-slate-900 rounded-lg">
                                                    <img id="t-img" alt="Main Power" class="sprite-image hidden">
                                                </div>
                                            </div>
                                            <img src="https://xat.com/content/web/R00243/img/navbar/new.svg" alt="New icon" class="h-10 w-10 object-contain drop-shadow-[0_0_8px_rgba(255,255,255,0.1)]">

                                    <td class="py-4 px-6 font-medium" id="t-store"></td>

                                <tr class="hover:bg-slate-800/30 transition-colors">

                                        <div class="text-[10px] text-slate-500/70 mt-1 italic">Puede tener un delay de 1-2 segundos</div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>
                
            </div>
        </aside>

        <!-- ZONA CENTRAL XAT (NO TOCAR) -->
        <div class="w-[726px] h-[487px] shrink-0">
            <!-- Esqueleto de Carga visible desde el centro absoluto del contenedor total -->
            <div id="loading" class="absolute inset-0 flex flex-col items-center justify-center -translate-y-12 animate-pulse-slow">
                <div class="w-16 h-16 border-4 border-blue-500/30 border-t-blue-500 rounded-full animate-spin mb-6 shadow-[0_0_15px_rgba(59,130,246,0.5)]"></div>
                <p class="text-blue-400 font-semibold text-lg tracking-widest uppercase bg-slate-900/50 px-6 py-2 rounded-full backdrop-blur-sm">Cargando catálogo...</p>
            </div>
            <!-- Error visible central -->
            <div id="error" class="absolute inset-0 flex-col items-center justify-center -translate-y-12 hidden">
                <div class="bg-red-500/10 border border-red-500/30 rounded-2xl p-8 max-w-md mx-auto backdrop-blur-sm text-center">
                    <svg class="w-16 h-16 mx-auto mb-4 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                    </svg>
                    <h3 class="text-white font-bold text-xl mb-2">Oops! Algo salió mal.</h3>

        <!-- PANEL DERECHO (Paginado, Dinámico, Sin Scroll) -->

            <!-- Escala CSS Exacta: Ancho interno 340px escalado al 80% -> 272px -->
            <div id="content" class="hidden" style="width: 340px; transform: scale(0.8); transform-origin: top left; position: absolute; top: 0; left: 0;">
                
                <!-- Sección de Smilies -->

                    <h2 class="text-xl font-bold text-white mb-6 border-b border-slate-800 pb-4 flex items-center gap-3">
                        <img src="https://s0.xat.com/web_gear/chat/GetStrip8.php?c=a_(p1pwn)_80" alt="Pawn icon" class="h-11 w-11 object-contain"> Pawns
                    </h2>
                    <!-- Forzamos grid-cols-2 por el espacio, con paginación desde JS -->

  <script>
    // ESTADOS GLOBALES DE NAVEGACIÓN Y BÚSQUEDA
    window.currentRightView = 'smilies';
    window.currentPage = 0;
    const ITEMS_PER_PAGE = 6; // Perfectamente calculado para encajar 3 filas de 2 sin desbordar
    window.apiSearchData = [];

    // --- NUEVO SISTEMA DE CONTROL DE VISTAS (Panel Derecho) ---
    window.switchRightView = function(view) {
        window.currentRightView = view;
        window.currentPage = 0; // Resetear página
        
        const secSmilies = document.getElementById('section-smilies');
        const secPawns = document.getElementById('section-pawns');
        const btnS = document.getElementById('top-btn-smilies');
        const btnP = document.getElementById('top-btn-pawns');

        if (view === 'smilies') {
            secSmilies.classList.remove('hidden');
            secPawns.classList.add('hidden');
            
            btnS.classList.replace('bg-transparent', 'bg-blue-600');
            btnS.classList.replace('border-transparent', 'border-blue-500');
            btnS.classList.replace('text-slate-400', 'text-white');
            btnS.classList.remove('opacity-80', 'hover:bg-slate-800');
            
            btnP.classList.replace('bg-blue-600', 'bg-transparent');
            btnP.classList.replace('border-blue-500', 'border-transparent');
            btnP.classList.replace('text-white', 'text-slate-400');
            btnP.classList.add('opacity-80', 'hover:bg-slate-800');
        } else {
            secPawns.classList.remove('hidden');
            secSmilies.classList.add('hidden');
            
            btnP.classList.replace('bg-transparent', 'bg-blue-600');
            btnP.classList.replace('border-transparent', 'border-blue-500');
            btnP.classList.replace('text-slate-400', 'text-white');
            btnP.classList.remove('opacity-80', 'hover:bg-slate-800');
            
            btnS.classList.replace('bg-blue-600', 'bg-transparent');
            btnS.classList.replace('border-blue-500', 'border-transparent');
            btnS.classList.replace('text-white', 'text-slate-400');
            btnS.classList.add('opacity-80', 'hover:bg-slate-800');
        }
        
        updatePaginationUI();
    };

    // --- SISTEMA DE PAGINACIÓN FLUIDA ---
    function updatePaginationUI() {
        const gridId = window.currentRightView === 'smilies' ? 'smileys-grid' : 'pawns-grid';
        const grid = document.getElementById(gridId);
        const cards = grid.children;
        const totalItems = cards.length;
        const totalPages = Math.max(1, Math.ceil(totalItems / ITEMS_PER_PAGE));
        
        // Evitar que la página se salga de rango si cambia rápido
        if (window.currentPage >= totalPages) window.currentPage = totalPages - 1;
        
        const start = window.currentPage * ITEMS_PER_PAGE;
        const end = start + ITEMS_PER_PAGE;
        
        for (let i = 0; i < cards.length; i++) {
            if (i >= start && i < end) {
                cards[i].style.display = 'flex';
            } else {
                cards[i].style.display = 'none';
            }
        }
        
        document.getElementById('page-indicator').textContent = `${window.currentPage + 1}/${totalPages}`;
    }

    window.nextPage = function() {
        const gridId = window.currentRightView === 'smilies' ? 'smileys-grid' : 'pawns-grid';
        const totalItems = document.getElementById(gridId).children.length;
        const totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE);
        if (window.currentPage < totalPages - 1) {
            window.currentPage++;
            updatePaginationUI();
        }
    };

    window.prevPage = function() {
        if (window.currentPage > 0) {
            window.currentPage--;
            updatePaginationUI();
        }
    };

    // --- NUEVO SISTEMA DE BÚSQUEDA EN TIEMPO REAL DESDE EL CONTROLADOR ---
    window.doTopSearch = function(query) {
        const dropdown = document.getElementById('search-dropdown');
        dropdown.innerHTML = '';
        
        if (!query.trim()) {
            dropdown.classList.add('hidden');
            return;
        }
        
        const term = query.toLowerCase();
        const results = window.apiSearchData.filter(d => d.name.toLowerCase().includes(term) || d.code.toLowerCase().includes(term));
        
        if (results.length === 0) {
            dropdown.innerHTML = '<div class="p-4 text-slate-400 text-sm italic text-center">Sin resultados</div>';
        } else {
            // Mostrar hasta 10 resultados para no sobrecargar el frame
            results.slice(0, 10).forEach(r => {
                const div = document.createElement('div');
                div.className = 'p-3 hover:bg-slate-700 cursor-pointer text-sm text-white flex justify-between items-center border-b border-slate-700/50 transition-colors';
                // Iconito de si es Pawn o Smiley para contexto
                const iconType = r.type === 'Pawn' ? '🎩' : '😃';
                div.innerHTML = `<span class="font-medium">${iconType} ${r.name}</span><span class="text-xs text-emerald-400 font-mono bg-emerald-400/10 px-2 py-1 rounded">${r.code}</span>`;
                div.onclick = () => window.topCopyCode(r.code);
                dropdown.appendChild(div);
            });
        }
        dropdown.classList.remove('hidden');
    };

    window.topCopyCode = function(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        try {
            document.execCommand('copy');
            const searchInput = document.getElementById('top-search');
            searchInput.value = '';
            searchInput.placeholder = '¡Código copiado con éxito!';
            searchInput.classList.add('border-emerald-500', 'placeholder-emerald-400');
            document.getElementById('search-dropdown').classList.add('hidden');
            
            setTimeout(() => { 
                searchInput.placeholder = 'Buscar códigos...'; 
                searchInput.classList.remove('border-emerald-500', 'placeholder-emerald-400');
            }, 2000);
        } catch(e) {
            console.error(e);
        }
        document.body.removeChild(textarea);
    };

    // Referencias a las vistas antiguas (ahora integradas en el flujo absolute)
    const loadingEl = document.getElementById('loading');
    const contentEl = document.getElementById('content');
    const errorEl = document.getElementById('error');

    // Referencias a la tabla
    const tId = document.getElementById('t-id');
    const tImg = document.getElementById('t-img');
    const tName = document.getElementById('t-name');
    const tDesc = document.getElementById('t-desc');
    const tStatusBadge = document.getElementById('t-status-badge');
    const tStore = document.getElementById('t-store');
    const tPrice = document.getElementById('t-price');

    // Referencias al Countdown
    const rowCountdown = document.getElementById('row-countdown');
    const tCountdownStatus = document.getElementById('t-countdown-status');
    const tCountdownTimer = document.getElementById('t-countdown-timer');
    let countdownInterval;

    // Referencias a los grids
    const smileysGrid = document.getElementById('smileys-grid');
    const pawnsGrid = document.getElementById('pawns-grid');

    // Control de vistas principal simplificado
    function showView(view) {
        loadingEl.classList.add('hidden');
        contentEl.classList.add('hidden');
        errorEl.classList.add('hidden');
        errorEl.classList.remove('flex');
        
        if(view === 'loading') loadingEl.classList.remove('hidden');
        if(view === 'content') contentEl.classList.remove('hidden');
        if(view === 'error') {
            errorEl.classList.remove('hidden');
            errorEl.classList.add('flex');
        }
    }

    // Mantenida intacta estructuralmente para no romper clases, pero ahora paginada
    function createImageCard(topText, imageUrl, bottomText, containerElement) {
        const card = document.createElement('div');
        card.className = 'group bg-slate-800/50 border border-slate-700/50 rounded-xl p-4 flex flex-col items-center justify-center hover:bg-slate-700 hover:border-slate-600 transition-all duration-300 shadow-sm hover:shadow-md relative';
        
        const topSpan = document.createElement('span');
        topSpan.className = 'text-sm font-bold text-white mb-3 w-full text-center truncate capitalize';
        topSpan.title = topText;
        topSpan.textContent = topText;

        const imgContainer = document.createElement('div');
        imgContainer.className = 'sprite-container mx-auto mb-3 bg-slate-900 rounded group-hover:scale-110 transition-transform duration-300 shadow-inner';
        
        const img = document.createElement('img');
        img.src = imageUrl;
        img.alt = topText;
        img.className = "sprite-image";
        
        img.onerror = function() {
            if (containerElement.id === 'pawns-grid' && this.src.includes('_80')) {
                this.src = this.src.replace('_80', '_40');
                return;
            }

            this.style.display = 'none';
            
            imgContainer.classList.add('flex', 'items-center', 'justify-center');
            const fallbackText = document.createElement('span');
            fallbackText.className = 'text-[10px] text-slate-500 font-medium text-center px-1';
            fallbackText.textContent = 'Sin imagen';
            imgContainer.appendChild(fallbackText);
        };

        const bottomSpan = document.createElement('span');
        bottomSpan.className = 'copyable-code text-xs font-mono font-semibold text-slate-300 bg-slate-900/80 px-2 py-1.5 rounded-lg w-full text-center truncate border border-slate-700 mt-auto group-hover:text-white group-hover:border-slate-500 transition-colors cursor-pointer select-text';
        bottomSpan.textContent = bottomText;
        bottomSpan.title = "Interactúa desde buscador superior"; // Actualizado por regla de iframe

        imgContainer.appendChild(img);
        card.appendChild(topSpan);
        card.appendChild(imgContainer);
        card.appendChild(bottomSpan);
        containerElement.appendChild(card);
    }

    async function cargarCountdown() {
        try {
            const res = await fetch("https://api.xatblog.net/countdown", {
                headers: { 'accept': '*/*' }
            });
            if (!res.ok) throw new Error(`Error HTTP Countdown: ${res.status}`);
            const data = await res.json();

            if (data.code === 200) {
                rowCountdown.classList.remove('hidden'); 
                
                let apiStatus = data.status || "Estado desconocido";
                if (apiStatus.toLowerCase() === "will be released") {
                    apiStatus = "Tiempo Restante";
                }
                tCountdownStatus.textContent = apiStatus;

                if (data.status_code === 'counting' && data.remaining_int) {
                    const targetTime = Date.now() + (parseInt(data.remaining_int, 10) * 1000);
                    
                    if (countdownInterval) clearInterval(countdownInterval);

                    const updateTimer = () => {
                        const timeLeft = Math.floor((targetTime - Date.now()) / 1000);

                        if (timeLeft <= 0) {
                            tCountdownTimer.textContent = "¡Lanzado!";
                            tCountdownTimer.classList.remove('text-amber-400');
                            tCountdownTimer.classList.add('text-emerald-400');
                            clearInterval(countdownInterval);
                            return;
                        }
                        
                        const d = Math.floor(timeLeft / (3600 * 24));
                        const h = Math.floor((timeLeft % (3600 * 24)) / 3600).toString().padStart(2, '0');
                        const m = Math.floor((timeLeft % 3600) / 60).toString().padStart(2, '0');
                        const s = Math.floor(timeLeft % 60).toString().padStart(2, '0');
                        
                        let timeString = `${h}:${m}:${s}`;
                        if (d > 0) timeString = `${d}d ` + timeString; 
                        
                        tCountdownTimer.textContent = timeString;
                    };

                    updateTimer(); 
                    countdownInterval = setInterval(updateTimer, 1000); 
                } else {
                    tCountdownTimer.textContent = "";
                }
            }
        } catch (error) {
            console.error("Error obteniendo countdown:", error);
            rowCountdown.classList.add('hidden'); 
        }
    }

    async function cargarDatos() {
        showView('loading');
        window.apiSearchData = []; // Limpiar base de búsqueda
        
        try {
            const res = await fetch("https://illuxat.com/api/latestpower");
            
            if (!res.ok) throw new Error(`Error HTTP: ${res.status}`);
            
            const json = await res.json();
            const item = json.data.latest;

            tId.textContent = item?.Id || "N/A";
            tName.textContent = item?.Name || "Desconocido";
            tDesc.textContent = item?.Descriptions?.shortDescription || "Sin descripción disponible.";
            tStore.textContent = item?.StoreStatus || "N/A";
            tPrice.textContent = item?.Prices?.store ? item.Prices.store : "N/A";

            const statusText = item?.Status || "N/A";
            tStatusBadge.innerHTML = `<span class="bg-blue-500/20 text-blue-400 py-1.5 px-4 rounded-full text-xs font-bold tracking-widest uppercase border border-blue-500/30 shadow-sm">${statusText}</span>`;

            const primerSmiley = (item?.Smileys && item.Smileys.length > 0) ? item.Smileys[0] : null;
            if (primerSmiley) {
                tImg.src = `https://s0.xat.com/web_gear/chat/GetStrip8.php?c=a_(${primerSmiley})_80`;
                tImg.style.display = 'block';
                tImg.onerror = function() { this.style.display = 'none'; };
            } else {
                tImg.style.display = 'none';
            }

            smileysGrid.innerHTML = ''; 
            if (item?.Smileys && Array.isArray(item.Smileys)) {
                item.Smileys.forEach(nombre => {
                    const imgUrl = `https://s0.xat.com/web_gear/chat/GetStrip8.php?c=a_(${nombre})_80`;
                    createImageCard(nombre, imgUrl, `(${nombre})`, smileysGrid);
                    
                    // Llenado de API interna para búsqueda
                    window.apiSearchData.push({ type: 'Smiley', name: nombre, code: `(${nombre})` });
                });
            } else {
                smileysGrid.innerHTML = '<p class="col-span-full text-slate-500 text-sm italic py-4 text-center">No se encontraron smilies.</p>';
            }

            pawnsGrid.innerHTML = ''; 
            if (item?.Pawns && typeof item.Pawns === 'object') {
                const pawnsEntries = Object.entries(item.Pawns); 

                if (pawnsEntries.length > 0) {
                    pawnsEntries.forEach(([code, nombre]) => {
                        const powerName = item.Name || "Desconocido";
                        
                        let validSmileyName = nombre;
                        if (!validSmileyName || String(validSmileyName).trim() === '') {
                            validSmileyName = (item.Smileys && item.Smileys.length > 0) ? item.Smileys[0] : powerName.toLowerCase();
                        }
                        
                        const imgUrl = `https://s0.xat.com/web_gear/chat/GetStrip8.php?c=a_(${validSmileyName})_80`;
                        createImageCard(powerName, imgUrl, `(hat#${code})`, pawnsGrid);
                        
                        // Llenado de API interna para búsqueda
                        window.apiSearchData.push({ type: 'Pawn', name: validSmileyName, code: `(hat#${code})` });
                    });
                } else {
                    pawnsGrid.innerHTML = '<p class="col-span-full text-slate-500 text-sm italic py-4 text-center">No se encontraron pawns.</p>';
                }
            } else {
                pawnsGrid.innerHTML = '<p class="col-span-full text-slate-500 text-sm italic py-4 text-center">No se encontraron pawns.</p>';
            }

            showView('content');
            cargarCountdown();
            
            // Iniciar paginación en la vista por defecto
            updatePaginationUI();
            
        } catch (error) {
            console.error("Error obteniendo datos:", error);
            showView('error');
        }
    }

    cargarDatos();

    // Event Listener extra para cerrar el dropdown si dan click fuera del buscador
    document.addEventListener('click', function(e) {
        if (!e.target.closest('#search-dropdown') && e.target.id !== 'top-search') {
            document.getElementById('search-dropdown').classList.add('hidden');
        }
    });

  </script>
