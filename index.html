<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Latest Power Frame By: EAM96</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse-slow {
      0%, 100% { opacity: 1; }
      50% { opacity: .5; }
    }
    .animate-pulse-slow {
      animation: pulse-slow 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    /* Contenedor estricto para el sprite */
    .sprite-container {
        width: 80px;
        height: 80px;
        overflow: hidden;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Imagen (sin animación para evitar parpadeo) */
    .sprite-image {
        height: 100%;
        width: auto;
        position: absolute;
        left: 0;
        top: 0;
        object-fit: contain;
    }

    /* --- AJUSTES VISUALES EXCLUSIVOS PARA PAWNS (Galería libre) --- */
    #pawns-grid > div {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        padding: 0 !important;
    }
    
    #pawns-grid > div:hover {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
    }

    #pawns-grid > div > span:first-of-type {
        display: none !important;
    }

    #pawns-grid .sprite-container {
        background: transparent !important;
        box-shadow: none !important;
        width: auto !important;
        height: auto !important;
        overflow: visible !important;
    }

    #pawns-grid .sprite-image {
        position: static !important;
        width: auto !important;
        height: auto !important;
        max-width: none !important;
        object-fit: none !important;
        image-rendering: auto; 
    }

    /* Ocultar barra de desplazamiento para overflow seguro del buscador horizontal */
    .search-scroll::-webkit-scrollbar {
        height: 4px;
    }
    .search-scroll::-webkit-scrollbar-track {
        background: transparent; 
    }
    .search-scroll::-webkit-scrollbar-thumb {
        background: rgba(59, 130, 246, 0.5); 
        border-radius: 10px;
    }
  </style>
</head>
<body class="bg-transparent text-slate-200 h-screen w-screen overflow-hidden font-sans antialiased selection:bg-blue-500/30 select-none flex justify-center m-0 p-0">

  <!-- CONTENEDOR MAESTRO ABSOLUTO PIXEL-PERFECT (1303px de área total interactiva) -->
  <div class="relative w-[1303px] h-[608px]">

    <!-- CONTROLADOR SUPERIOR (ÚNICA ZONA INTERACTIVA - pt-[62px] por banner xat) -->
    <header class="absolute top-0 left-0 w-[1303px] h-[91px] pt-[62px] flex items-center justify-between px-6 pointer-events-auto z-50">
        
        <!-- CONTENIDO NORMAL DE CABECERA -->
        <div id="top-normal-content" class="flex items-center gap-6 w-full transition-opacity">
            <h1 class="text-xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 tracking-tight whitespace-nowrap">
                Último Power
            </h1>
            
            <!-- Pestañas de Navegación -->
            <div class="flex items-center gap-2 bg-slate-900/80 p-1 rounded-xl border border-slate-700 shadow-md backdrop-blur-sm">
                <button onclick="window.switchRightView('smilies')" id="top-btn-smilies" class="px-5 py-1 bg-blue-600 border border-blue-500 rounded-lg text-xs font-bold text-white shadow-sm transition-all">
                    Smilies
                </button>
                <button onclick="window.switchRightView('pawns')" id="top-btn-pawns" class="px-5 py-1 bg-transparent hover:bg-slate-800 border border-transparent rounded-lg text-xs font-bold text-slate-400 hover:text-white transition-all opacity-80">
                    Pawns
                </button>
            </div>

            <!-- Paginación Panel Derecho -->
            <div class="flex items-center gap-3 bg-slate-900/80 px-3 py-1.5 rounded-xl border border-slate-700 shadow-md backdrop-blur-sm">
                <button onclick="window.prevPage()" class="text-slate-400 hover:text-white transition-colors cursor-pointer">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" /></svg>
                </button>
                <span id="page-indicator" class="text-xs font-bold text-slate-300 font-mono w-10 text-center">1/1</span>
                <button onclick="window.nextPage()" class="text-slate-400 hover:text-white transition-colors cursor-pointer">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7" /></svg>
                </button>
            </div>

            <!-- Botón Ocultar/Mostrar UI -->
            <button onclick="window.toggleUI()" id="top-btn-toggle" class="px-3 py-1.5 ml-2 bg-slate-800 border border-slate-700 rounded-lg text-xs font-bold text-slate-300 hover:text-white transition-all shadow-sm flex items-center gap-1.5 cursor-pointer">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                Ocultar UI
            </button>
        </div>

        <!-- CONTENIDO BUSCADOR HORIZONTAL (Oculto por defecto, visible al tipear) -->
        <div id="search-horizontal-results" class="hidden flex-1 items-center gap-3 overflow-hidden h-full px-4 w-full">
           <span class="text-xs text-slate-400 whitespace-nowrap font-semibold shrink-0">Resultados:</span>
           <div id="search-results-container" class="flex items-center gap-2 flex-1 overflow-x-auto search-scroll h-full pb-1 pt-1">
               <!-- CHIPS DE RESULTADOS DINÁMICOS -->
           </div>
        </div>

        <!-- BUSCADOR INPUT -->
        <div class="relative w-72 shrink-0 h-[30px] ml-auto">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
            <input type="text" id="top-search" oninput="window.doTopSearch(this.value)" placeholder="Buscar códigos..." class="block w-full h-full pl-9 pr-3 py-1 border border-slate-700 rounded-lg leading-5 bg-slate-900/80 backdrop-blur-sm text-slate-300 placeholder-slate-500 focus:outline-none focus:bg-slate-800 focus:border-blue-500 transition-colors text-xs shadow-md">
        </div>
    </header>

    <!-- ÁREA PRINCIPAL XATFRAME (100% Bloqueada para clics) -->
    <main class="absolute top-[91px] left-0 w-[1303px] h-[487px] pointer-events-none">

        <!-- PANEL IZQUIERDO (CUADRO 1: DETALLES) -->
        <aside id="left-panel" class="absolute top-[30px] left-[40px] w-[229px] h-[408px] overflow-hidden pointer-events-none transition-opacity duration-300">
            <!-- Escala CSS Exacta que ya mantenías: Ancho interno 380px escalado al 60.2% -> 229px -->
            <div style="width: 380px; transform: scale(0.602); transform-origin: top left; position: absolute; top: 0; left: 0;">
                
                <section id="section-details" class="bg-slate-900 rounded-2xl shadow-2xl border border-slate-800 overflow-hidden w-full">
                    <div class="bg-slate-800/50 p-6 border-b border-slate-800 flex items-center justify-between">
                        <h2 class="text-2xl font-bold text-white flex items-center gap-3">
                            <img src="https://xat.com/content/web/R00243//img/navbar/powers.svg" alt="Powers icon" class="h-8 w-8 object-contain"> Detalles del Power
                        </h2>
                        <div id="t-status-badge"></div>
                    </div>
                    
                    <div class="overflow-hidden">
                        <table class="w-full text-left border-collapse">
                            <tbody class="divide-y divide-slate-800 text-base">
                                <tr class="hover:bg-slate-800/30 transition-colors">
                                    <th class="py-4 px-6 bg-slate-900/50 font-semibold w-1/3 text-slate-400 uppercase text-xs tracking-wider">ID</th>
                                    <td class="py-4 px-6 font-mono text-blue-300 font-medium" id="t-id"></td>
                                </tr>
                                <tr class="hover:bg-slate-800/30 transition-colors">
                                    <th class="py-4 px-6 bg-slate-900/50 font-semibold w-1/3 text-slate-400 uppercase text-xs tracking-wider">Power</th>
                                    <td class="py-4 px-6">
                                        <div class="flex items-center gap-4">
                                            <div class="inline-block p-1 bg-slate-800 rounded-xl border border-slate-700 shadow-inner">
                                                <div class="sprite-container mx-auto bg-slate-900 rounded-lg">
                                                    <img id="t-img" alt="Main Power" class="sprite-image hidden">
                                                </div>
                                            </div>
                                            <img src="https://xat.com/content/web/R00243/img/navbar/new.svg" alt="New icon" class="h-10 w-10 object-contain drop-shadow-[0_0_8px_rgba(255,255,255,0.1)]">
                                        </div>
                                    </td>
                                </tr>
                                <tr class="hover:bg-slate-800/30 transition-colors">
                                    <th class="py-4 px-6 bg-slate-900/50 font-semibold w-1/3 text-slate-400 uppercase text-xs tracking-wider">Nombre</th>
                                    <td class="py-4 px-6 font-bold text-white text-xl capitalize tracking-wide" id="t-name"></td>
                                </tr>
                                <tr class="hover:bg-slate-800/30 transition-colors">
                                    <th class="py-4 px-6 bg-slate-900/50 font-semibold w-1/3 text-slate-400 uppercase text-xs tracking-wider">Descripción</th>
                                    <td class="py-4 px-6 text-slate-300 leading-relaxed" id="t-desc"></td>
                                </tr>
                                <tr class="hover:bg-slate-800/30 transition-colors">
                                    <th class="py-4 px-6 bg-slate-900/50 font-semibold w-1/3 text-slate-400 uppercase text-xs tracking-wider">Store Status</th>
                                    <td class="py-4 px-6 font-medium" id="t-store"></td>
                                </tr>
                                <tr class="hover:bg-slate-800/30 transition-colors">
                                    <th class="py-4 px-6 bg-slate-900/50 font-semibold w-1/3 text-slate-400 uppercase text-xs tracking-wider">Precio</th>
                                    <td class="py-4 px-6 font-extrabold text-emerald-400 text-2xl tracking-tight" id="t-price"></td>
                                </tr>
                                <tr class="hover:bg-slate-800/30 transition-colors hidden" id="row-countdown">
                                    <th class="py-4 px-6 bg-slate-900/50 font-semibold w-1/3 text-slate-400 uppercase text-xs tracking-wider">Lanzamiento</th>
                                    <td class="py-4 px-6">
                                        <div id="t-countdown-status" class="text-sm font-medium text-slate-300 mb-1 capitalize"></div>
                                        <div id="t-countdown-timer" class="font-mono text-xl text-amber-400 font-bold tracking-wider"></div>
                                        <div class="text-[10px] text-slate-500/70 mt-1 italic">Puede tener un delay de 1-2 segundos</div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>
                
            </div>
        </aside>

        <!-- ZONA CENTRAL XAT (CUADRO 2: CHAT) -->
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[726px] h-[487px] shrink-0 pointer-events-none">
            <!-- Esqueleto de Carga -->
            <div id="loading" class="absolute inset-0 flex flex-col items-center justify-center -translate-y-12 animate-pulse-slow">
                <div class="w-16 h-16 border-4 border-blue-500/30 border-t-blue-500 rounded-full animate-spin mb-6 shadow-[0_0_15px_rgba(59,130,246,0.5)]"></div>
                <p class="text-blue-400 font-semibold text-lg tracking-widest uppercase bg-slate-900/50 px-6 py-2 rounded-full backdrop-blur-sm">Cargando catálogo...</p>
            </div>
            <!-- Error -->
            <div id="error" class="absolute inset-0 flex-col items-center justify-center -translate-y-12 hidden">
                <div class="bg-red-500/10 border border-red-500/30 rounded-2xl p-8 max-w-md mx-auto backdrop-blur-sm text-center">
                    <svg class="w-16 h-16 mx-auto mb-4 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                    </svg>
                    <h3 class="text-white font-bold text-xl mb-2">Oops! Algo salió mal.</h3>
                    <p class="text-red-300/80 font-medium text-sm mb-6">No pudimos conectar con la API para cargar el catálogo de datos.</p>
                </div>
            </div>
        </div>

        <!-- PANEL DERECHO (CUADRO 3: SMILIES/PAWNS) -->
        <aside id="right-panel" class="absolute top-[30px] right-[0px] w-[272px] h-[473px] overflow-hidden pointer-events-none transition-opacity duration-300">
            
            <div id="content" class="hidden w-full h-full" style="width: 340px; transform: scale(0.8); transform-origin: top left; position: absolute; top: 0; left: 0;">
                
                <!-- Sección de Smilies -->
                <section id="section-smilies" class="bg-slate-900 rounded-2xl shadow-2xl border border-slate-800 p-5 w-full h-[590px] flex flex-col">
                    <h2 class="text-xl font-bold text-white mb-4 border-b border-slate-800 pb-3 flex items-center gap-3 shrink-0">
                        <img src="https://s0.xat.com/web_gear/chat/GetStrip8.php?c=a_(smile)_40" alt="Smile icon" class="h-6 w-6 object-contain" style="image-rendering: auto;"> Smilies
                    </h2>
                    <div class="flex-1 w-full overflow-hidden">
                        <!-- Grid fija para 6 elementos gigantes y legibles -->
                        <div id="smileys-grid" class="grid grid-cols-2 gap-3 content-start w-full"></div>
                    </div>
                </section>

                <!-- Sección de Pawns -->
                <section id="section-pawns" class="bg-slate-900 rounded-2xl shadow-2xl border border-slate-800 p-5 w-full h-[590px] hidden flex-col">
                    <h2 class="text-xl font-bold text-white mb-4 border-b border-slate-800 pb-3 flex items-center gap-3 shrink-0">
                        <img src="https://s0.xat.com/web_gear/chat/GetStrip8.php?c=a_(p1pwn)_40" alt="Pawn icon" class="h-6 w-6 object-contain" style="image-rendering: auto;"> Pawns
                    </h2>
                    <div class="flex-1 w-full overflow-hidden">
                        <div id="pawns-grid" class="grid grid-cols-2 gap-3 content-start w-full"></div>
                    </div>
                </section>

            </div>
        </aside>

    </main>
  </div>

  <script>
    // ESTADOS GLOBALES DE NAVEGACIÓN Y BÚSQUEDA
    window.currentRightView = 'smilies';
    window.currentPage = 0;
    const ITEMS_PER_PAGE = 6; // Exacto para 2 columnas x 3 filas maximizadas
    window.apiSearchData = [];
    window.uiVisible = true;

    // --- TOGGLE UI COMPLETA ---
    window.toggleUI = function() {
        window.uiVisible = !window.uiVisible;
        const lp = document.getElementById('left-panel');
        const rp = document.getElementById('right-panel');
        const btn = document.getElementById('top-btn-toggle');
        
        if (window.uiVisible) {
            lp.classList.remove('opacity-0');
            rp.classList.remove('opacity-0');
            btn.innerHTML = `<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg> Ocultar UI`;
            btn.classList.replace('bg-slate-700', 'bg-slate-800');
            btn.classList.replace('text-white', 'text-slate-300');
        } else {
            lp.classList.add('opacity-0');
            rp.classList.add('opacity-0');
            btn.innerHTML = `<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg> Mostrar UI`;
            btn.classList.replace('bg-slate-800', 'bg-slate-700');
            btn.classList.replace('text-slate-300', 'text-white');
        }
    };

    // --- SISTEMA DE CONTROL DE VISTAS ---
    window.switchRightView = function(view) {
        window.currentRightView = view;
        window.currentPage = 0; // Resetear página al cambiar tab
        
        const secSmilies = document.getElementById('section-smilies');
        const secPawns = document.getElementById('section-pawns');
        const btnS = document.getElementById('top-btn-smilies');
        const btnP = document.getElementById('top-btn-pawns');

        if (view === 'smilies') {
            secSmilies.classList.remove('hidden');
            secSmilies.classList.add('flex');
            secPawns.classList.add('hidden');
            secPawns.classList.remove('flex');
            
            btnS.classList.replace('bg-transparent', 'bg-blue-600');
            btnS.classList.replace('border-transparent', 'border-blue-500');
            btnS.classList.replace('text-slate-400', 'text-white');
            btnS.classList.remove('opacity-80', 'hover:bg-slate-800');
            
            btnP.classList.replace('bg-blue-600', 'bg-transparent');
            btnP.classList.replace('border-blue-500', 'border-transparent');
            btnP.classList.replace('text-white', 'text-slate-400');
            btnP.classList.add('opacity-80', 'hover:bg-slate-800');
        } else {
            secPawns.classList.remove('hidden');
            secPawns.classList.add('flex');
            secSmilies.classList.add('hidden');
            secSmilies.classList.remove('flex');
            
            btnP.classList.replace('bg-transparent', 'bg-blue-600');
            btnP.classList.replace('border-transparent', 'border-blue-500');
            btnP.classList.replace('text-slate-400', 'text-white');
            btnP.classList.remove('opacity-80', 'hover:bg-slate-800');
            
            btnS.classList.replace('bg-blue-600', 'bg-transparent');
            btnS.classList.replace('border-blue-500', 'border-transparent');
            btnS.classList.replace('text-white', 'text-slate-400');
            btnS.classList.add('opacity-80', 'hover:bg-slate-800');
        }
        updatePaginationUI();
    };

    // --- SISTEMA DE PAGINACIÓN ---
    function updatePaginationUI() {
        const gridId = window.currentRightView === 'smilies' ? 'smileys-grid' : 'pawns-grid';
        const grid = document.getElementById(gridId);
        const cards = grid.children;
        const totalItems = cards.length;
        const totalPages = Math.max(1, Math.ceil(totalItems / ITEMS_PER_PAGE));
        
        if (window.currentPage >= totalPages) window.currentPage = totalPages - 1;
        
        const start = window.currentPage * ITEMS_PER_PAGE;
        const end = start + ITEMS_PER_PAGE;
        
        for (let i = 0; i < cards.length; i++) {
            if (i >= start && i < end) {
                cards[i].style.display = 'flex';
            } else {
                cards[i].style.display = 'none';
            }
        }
        
        document.getElementById('page-indicator').textContent = `${window.currentPage + 1}/${totalPages}`;
    }

    window.nextPage = function() {
        const gridId = window.currentRightView === 'smilies' ? 'smileys-grid' : 'pawns-grid';
        const totalItems = document.getElementById(gridId).children.length;
        const totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE);
        if (window.currentPage < totalPages - 1) {
            window.currentPage++;
            updatePaginationUI();
        }
    };

    window.prevPage = function() {
        if (window.currentPage > 0) {
            window.currentPage--;
            updatePaginationUI();
        }
    };

    // --- BÚSQUEDA EN TIEMPO REAL CON IMÁGENES EXACTAS DE LA API ---
    window.doTopSearch = function(query) {
        const normalContent = document.getElementById('top-normal-content');
        const resultsWrapper = document.getElementById('search-horizontal-results');
        const resultsContainer = document.getElementById('search-results-container');
        
        resultsContainer.innerHTML = '';
        
        if (!query.trim()) {
            resultsWrapper.classList.add('hidden');
            resultsWrapper.classList.remove('flex');
            normalContent.style.display = 'flex';
            return;
        }
        
        normalContent.style.display = 'none'; 
        resultsWrapper.classList.remove('hidden');
        resultsWrapper.classList.add('flex');
        
        const term = query.toLowerCase();
        const results = window.apiSearchData.filter(d => d.name.toLowerCase().includes(term) || d.code.toLowerCase().includes(term));
        
        if (results.length === 0) {
            resultsContainer.innerHTML = `<span class="text-xs text-slate-500 italic" data-i18n="no_matches">${i18n[currentLang].no_matches}</span>`;
        } else {
            results.slice(0, 10).forEach(r => {
                const btn = document.createElement('button');
                btn.className = 'px-3 py-1 bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded flex items-center gap-2 text-xs text-white transition-colors whitespace-nowrap shrink-0 group pointer-events-auto';
                
                // Imagen real de la API
                const imgNode = `<img src="${r.imgUrl}" class="w-5 h-5 object-contain" style="image-rendering: auto;">`;
                
                btn.innerHTML = `${imgNode} <span class="font-medium ml-1">${r.name}</span> <span class="text-emerald-400 font-mono bg-emerald-400/10 px-1.5 py-0.5 rounded shadow-inner group-hover:bg-emerald-400/20">${r.code}</span>`;
                btn.onclick = () => window.topCopyCode(r.code, btn);
                resultsContainer.appendChild(btn);
            });
        }
    };

    window.topCopyCode = function(text, btnElement) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        try {
            document.execCommand('copy');
            const originalHtml = btnElement.innerHTML;
            
            btnElement.innerHTML = `<span class="text-emerald-400 font-bold px-2 py-0.5" data-i18n="copied">${i18n[currentLang].copied}</span>`;
            btnElement.classList.replace('border-slate-600', 'border-emerald-500');
            btnElement.classList.replace('bg-slate-800', 'bg-emerald-900/40');
            
            const searchInput = document.getElementById('top-search');
            searchInput.placeholder = i18n[currentLang].search_copied;
            
            setTimeout(() => {
                btnElement.innerHTML = originalHtml;
                btnElement.classList.replace('border-emerald-500', 'border-slate-600');
                btnElement.classList.replace('bg-emerald-900/40', 'bg-slate-800');
                searchInput.placeholder = i18n[currentLang].search_placeholder;
            }, 1200);
        } catch(e) {
            console.error(e);
        }
        document.body.removeChild(textarea);
    };

    const loadingEl = document.getElementById('loading');
    const contentEl = document.getElementById('content');
    const errorEl = document.getElementById('error');

    const tId = document.getElementById('t-id');
    const tImg = document.getElementById('t-img');
    const tName = document.getElementById('t-name');
    const tDesc = document.getElementById('t-desc');
    const tStatusBadge = document.getElementById('t-status-badge');
    const tStore = document.getElementById('t-store');
    const tPrice = document.getElementById('t-price');

    const rowCountdown = document.getElementById('row-countdown');
    const tCountdownStatus = document.getElementById('t-countdown-status');
    const tCountdownTimer = document.getElementById('t-countdown-timer');
    let countdownInterval;

    const smileysGrid = document.getElementById('smileys-grid');
    const pawnsGrid = document.getElementById('pawns-grid');

    function showView(view) {
        loadingEl.classList.add('hidden');
        contentEl.classList.add('hidden');
        errorEl.classList.add('hidden');
        errorEl.classList.remove('flex');
        
        if(view === 'loading') loadingEl.classList.remove('hidden');
        if(view === 'content') contentEl.classList.remove('hidden');
        if(view === 'error') {
            errorEl.classList.remove('hidden');
            errorEl.classList.add('flex');
        }
    }

    // Card optimizada para eliminar espacios huecos, alinear verticalmente y mantener imágenes grandes
    function createImageCard(topText, imageUrl, bottomText, containerElement) {
        const card = document.createElement('div');
        // Rediseño de card: justify-center (centra el contenido) y gap-1.5 (une los elementos visualmente)
        card.className = 'w-full h-[145px] group bg-slate-800/50 border border-slate-700/50 rounded-xl p-2 flex flex-col items-center justify-center gap-1.5 shadow-sm relative';
        
        const topSpan = document.createElement('span');
        topSpan.className = 'text-sm font-bold text-white w-full text-center truncate capitalize shrink-0 leading-tight';
        topSpan.title = topText;
        topSpan.textContent = topText;

        const imgContainer = document.createElement('div');
        // flex-1 permite que el contenedor abrace la imagen. Eliminamos márgenes excesivos para compactar.
        imgContainer.className = 'sprite-container mx-auto bg-slate-900 rounded-lg shadow-inner flex-1 w-full flex items-center justify-center p-1 min-h-0';
        
        const img = document.createElement('img');
        img.src = imageUrl;
        img.alt = topText;
        // !static, !w-full, !h-full, !object-contain sobreescriben la posición left:0 absoluta del CSS base para centrar milimétricamente
        img.className = "sprite-image !static !w-full !h-full !object-contain transition-transform duration-300 group-hover:scale-110 drop-shadow-md";
        
        img.onerror = function() {
            if (containerElement.id === 'pawns-grid' && this.src.includes('_80')) {
                this.src = this.src.replace('_80', '_40');
                return;
            }
            this.style.display = 'none';
            imgContainer.classList.add('flex', 'items-center', 'justify-center');
            const fallbackText = document.createElement('span');
            fallbackText.className = 'text-[10px] text-slate-500 font-medium text-center px-1';
            fallbackText.textContent = 'Sin imagen';
            imgContainer.appendChild(fallbackText);
        };

        const bottomSpan = document.createElement('span');
        bottomSpan.className = 'copyable-code text-[11px] font-mono font-semibold text-slate-300 bg-slate-900/80 px-2 py-1.5 rounded-lg w-full text-center truncate border border-slate-700 select-none shrink-0 transition-colors group-hover:border-slate-500 group-hover:text-white';
        bottomSpan.textContent = bottomText;
        bottomSpan.title = "Interactúa desde buscador superior"; 

        imgContainer.appendChild(img);
        card.appendChild(topSpan);
        card.appendChild(imgContainer);
        card.appendChild(bottomSpan);
        containerElement.appendChild(card);
    }

    async function cargarCountdown() {
        try {
            const res = await fetch("https://api.xatblog.net/countdown", {
                headers: { 'accept': '*/*' }
            });
            if (!res.ok) throw new Error(`Error HTTP Countdown: ${res.status}`);
            const data = await res.json();

            if (data.code === 200) {
                rowCountdown.classList.remove('hidden'); 
                
                let apiStatus = data.status || "Estado desconocido";
                if (apiStatus.toLowerCase() === "will be released") {
                    apiStatus = "Tiempo Restante";
                }
                tCountdownStatus.textContent = apiStatus;

                if (data.status_code === 'counting' && data.remaining_int) {
                    const targetTime = Date.now() + (parseInt(data.remaining_int, 10) * 1000);
                    
                    if (countdownInterval) clearInterval(countdownInterval);

                    const updateTimer = () => {
                        const timeLeft = Math.floor((targetTime - Date.now()) / 1000);

                        if (timeLeft <= 0) {
                            tCountdownTimer.textContent = "¡Lanzado!";
                            tCountdownTimer.classList.remove('text-amber-400');
                            tCountdownTimer.classList.add('text-emerald-400');
                            clearInterval(countdownInterval);
                            return;
                        }
                        
                        const d = Math.floor(timeLeft / (3600 * 24));
                        const h = Math.floor((timeLeft % (3600 * 24)) / 3600).toString().padStart(2, '0');
                        const m = Math.floor((timeLeft % 3600) / 60).toString().padStart(2, '0');
                        const s = Math.floor(timeLeft % 60).toString().padStart(2, '0');
                        
                        let timeString = `${h}:${m}:${s}`;
                        if (d > 0) timeString = `${d}d ` + timeString; 
                        
                        tCountdownTimer.textContent = timeString;
                    };

                    updateTimer(); 
                    countdownInterval = setInterval(updateTimer, 1000); 
                } else {
                    tCountdownTimer.textContent = "";
                }
            }
        } catch (error) {
            console.error("Error obteniendo countdown:", error);
            rowCountdown.classList.add('hidden'); 
        }
    }

    async function cargarDatos() {
        showView('loading');
        window.apiSearchData = []; 
        
        try {
            const res = await fetch("https://illuxat.com/api/latestpower");
            
            if (!res.ok) throw new Error(`Error HTTP: ${res.status}`);
            
            const json = await res.json();
            const item = json.data.latest;

            tId.textContent = item?.Id || "N/A";
            tName.textContent = item?.Name || "Desconocido";
            tDesc.textContent = item?.Descriptions?.shortDescription || "Sin descripción disponible.";
            tStore.textContent = item?.StoreStatus || "N/A";
            tPrice.textContent = item?.Prices?.store ? item.Prices.store : "N/A";

            const statusText = item?.Status || "N/A";
            tStatusBadge.innerHTML = `<span class="bg-blue-500/20 text-blue-400 py-1.5 px-4 rounded-full text-xs font-bold tracking-widest uppercase border border-blue-500/30 shadow-sm">${statusText}</span>`;

            const primerSmiley = (item?.Smileys && item.Smileys.length > 0) ? item.Smileys[0] : null;
            if (primerSmiley) {
                tImg.src = `https://s0.xat.com/web_gear/chat/GetStrip8.php?c=a_(${primerSmiley})_80`;
                tImg.style.display = 'block';
                tImg.onerror = function() { this.style.display = 'none'; };
            } else {
                tImg.style.display = 'none';
            }

            smileysGrid.innerHTML = ''; 
            if (item?.Smileys && Array.isArray(item.Smileys)) {
                item.Smileys.forEach(nombre => {
                    const imgUrl = `https://s0.xat.com/web_gear/chat/GetStrip8.php?c=a_(${nombre})_80`;
                    createImageCard(nombre, imgUrl, `(${nombre})`, smileysGrid);
                    
                    window.apiSearchData.push({ type: 'Smiley', name: nombre, code: `(${nombre})`, imgUrl: imgUrl });
                });
            } else {
                smileysGrid.innerHTML = '<p class="col-span-full text-slate-500 text-sm italic py-4 text-center">No se encontraron smilies.</p>';
            }

            pawnsGrid.innerHTML = ''; 
            if (item?.Pawns && typeof item.Pawns === 'object') {
                const pawnsEntries = Object.entries(item.Pawns); 

                if (pawnsEntries.length > 0) {
                    pawnsEntries.forEach(([code, nombre]) => {
                        const powerName = item.Name || "Desconocido";
                        
                        let validSmileyName = nombre;
                        if (!validSmileyName || String(validSmileyName).trim() === '') {
                            validSmileyName = (item.Smileys && item.Smileys.length > 0) ? item.Smileys[0] : powerName.toLowerCase();
                        }
                        
                        const imgUrl = `https://s0.xat.com/web_gear/chat/GetStrip8.php?c=a_(${validSmileyName})_80`;
                        createImageCard(powerName, imgUrl, `(hat#${code})`, pawnsGrid);
                        
                        window.apiSearchData.push({ type: 'Pawn', name: validSmileyName, code: `(hat#${code})`, imgUrl: imgUrl });
                    });
                } else {
                    pawnsGrid.innerHTML = '<p class="col-span-full text-slate-500 text-sm italic py-4 text-center">No se encontraron pawns.</p>';
                }
            } else {
                pawnsGrid.innerHTML = '<p class="col-span-full text-slate-500 text-sm italic py-4 text-center">No se encontraron pawns.</p>';
            }

            showView('content');
            cargarCountdown();
            updatePaginationUI();
            
        } catch (error) {
            console.error("Error obteniendo datos:", error);
            showView('error');
        }
    }

    cargarDatos();

  </script>
